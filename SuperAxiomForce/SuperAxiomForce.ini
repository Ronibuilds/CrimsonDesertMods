[AxiomForce]

; Enable or disable the mod (true/false)
; Set to false to restore the default vanilla range
Enabled=true

; Axiom Force targeting range
; Increase this to extend how far Axiom Force can reach enemies.
; Recommended values: Use whatever you like, I personally use 500.0, there seems to be a hard limit somewhere in-game, beyond 95 not much happens
Range=100.0

; Pull speed multiplier
; Controls how fast enemies/objects are pulled toward you
; Keep this roughly 2x Range for natural-feeling pulls
PullSpeed=200.0

; ============================================================
; NEW FEATURES (v2.0)
; ============================================================

; Straight Pull - Makes aerial pulls go STRAIGHT to the target
; When enabled, removes the curved/arcing trajectory for a direct line pull
; Very satisfying for precise movement and combat
; Default: true (highly recommended)
StraightPull=true

; Instant Axiom - Makes Axiom Force activate and pull INSTANTLY
; WARNING: This is VERY fast and can feel jarring. Try it out!
; Removes both the cast time and pull duration for instant teleport-like movement
; Great for fast-paced combat, but can be disorienting at first
; Default: false (try it and see if you like it)
InstantAxiom=false
