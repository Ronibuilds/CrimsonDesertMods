; ============================================================
;  EnhancedFlight Configuration
; ============================================================
; This file controls enhanced flight mechanics for Crimson Desert
; All settings support live reload - changes take effect within 1 second
;

[Ascend]
; Enable/disable upward flight boost (default: true)
Enabled=true

; Vertical velocity value when ascending (default: 12.0)
; Higher values = faster ascent
BoostValue=12.0

; Controller button for ascend (default: 512 = RB/R1)
Button=512

; Keyboard key for ascend (default: 0x14 = Caps Lock)
; Supports decimal (20) or hex (0x14)
Key=0x14

; Time to ramp UP to full ascend speed (default: 300ms)
; Set to 0 for instant (old behavior)
RampUpMs=300

; Time to ramp DOWN back to 0 when button released (default: 200ms)
; Set to 0 for instant stop
RampDownMs=200


[Descend]
; Enable/disable downward flight boost (default: true)
Enabled=true

; Vertical velocity value when descending (default: -12.0)
; More negative values = faster descent
BoostValue=-12.0

; Controller button for descend (default: 0x1000 = RT/R2)
; Note: RT uses trigger threshold, not button press
Button=0x1000

; Keyboard key for descend (default: 0x11 = Ctrl)
Key=0x11

; Time to ramp UP to full descend speed (default: 300ms)
; Set to 0 for instant (old behavior)
RampUpMs=300

; Time to ramp DOWN back to 0 when button released (default: 200ms)
; Set to 0 for instant stop
RampDownMs=200


[Horizontal]
; Enable/disable horizontal flight boost (default: true)
Enabled=true

; Use toggle mode instead of hold mode (default: false)
; false = Hold button to boost (recommended for better control)
; true  = Press button to toggle boost on/off
UseToggle=false

; Horizontal flight speed multiplier (default: 4.0)
; Applied to movement delta while boost is active
BoostValue=4.0

; Controller button for horizontal boost (default: 4096 = A/Cross)
Button=4096

; Keyboard key for horizontal boost (default: 0xA0 = Left Shift)
Key=0xA0

; Time to smoothly ramp UP to max horizontal boost speed (default: 500ms)
RampUpMs=1000

; Time to smoothly ramp DOWN to normal speed when you release the button (default: 300ms)
RampDownMs=2500


[AerialRoll]
; Enable/disable aerial roll speed boost (default: true)
; Activates when you press B/Circle during flight
Enabled=true

; Controller button for aerial roll (default: 8192 = B/Circle)
Button=8192

; Keyboard key for aerial roll (default: 0xA4 = Left Alt)
Key=0xA4

; Speed multiplier during aerial roll boost (default: 4.5)
; 4.5 is the recommended sweet spot when chaining with Focused Aerial Boost — fast but not overwhelming.
; If you don’t use Focused Aerial, you can raise this freely (6–10) for much faster travel.
BoostValue=3.0

; Boost duration in seconds (default: 3.0)
; How long the boost stays at max speed before it starts ramping down
Duration=3.0

; Time to smoothly ramp UP to max aerial boost speed (default: 400ms)
RampUpMs=400

; Time to smoothly ramp DOWN to normal speed when boost expires (default: 600ms)
RampDownMs=2500


; ============================================================
;  CONTROLLER SUPPORT
; ============================================================
; This mod supports BOTH Xbox and PS5 DualSense controllers:
;
; XBOX CONTROLLERS (XInput):
;   - Works with Xbox One, Xbox Series X|S, Xbox 360 controllers
;   - Plug and play support
;
; PS5 DUALSENSE CONTROLLERS (Native HID):
;   - Works with DualSense and DualSense Edge
;   - USB (wired) - plug in via USB-C cable, instant detection
;   - Bluetooth (wireless) - pair to Windows, works automatically
;   - NO need for Steam Input, DS4Windows, or DualSenseX!
;   - Button mappings: Cross=A, Circle=B, Square=X, Triangle=Y, R1=RB, L1=LB, R2=RT, L2=LT
;
; You can use either controller type - the mod auto-detects which is connected.
; If both are connected, PS5 controller takes priority.
;
;
; ============================================================
;  CONTROLLER BUTTON CODES (XInput Format)
; ============================================================
; Common controller buttons (use these values in the settings above):
;   A/Cross      = 4096
;   B/Circle     = 8192
;   X/Square     = 16384
;   Y/Triangle   = 32768
;   LB/L1        = 256
;   RB/R1        = 512
;   LT (analog)  = 0x0800 (custom flag for left trigger)
;   RT (analog)  = 0x1000 (custom flag for right trigger)
;   L3 (stick)   = 64
;   R3 (stick)   = 128
;   Start        = 16
;   Back/Select  = 32
;   D-Pad Up     = 1
;   D-Pad Down   = 2
;   D-Pad Left   = 4
;   D-Pad Right  = 8
;
; Note: LT and RT are analog triggers (0-255)
;       Triggers activate when pressed > 50% (threshold of 128)
;       You can now bind Ascend/Descend to either LT (0x0800) or RT (0x1000)!
;       PS5 DualSense buttons are automatically mapped to these values
;

; ============================================================
;  KEYBOARD VIRTUAL-KEY CODES
; ============================================================
; Common keyboard keys:
;   Caps Lock    = 0x14 (20)
;   Shift        = 0x10 (16)
;   Left Shift   = 0xA0 (160)
;   Ctrl         = 0x11 (17)
;   Alt          = 0x12 (18)
;   Left Alt     = 0xA4 (164)
;   Space        = 0x20 (32)
;   X            = 0x58 (88)
;   C            = 0x43 (67)
;   V            = 0x56 (86)
;   F1-F12       = 0x70-0x7B (112-123)
;
; Full list: https://learn.microsoft.com/en-us/windows/win32/inputdev/virtual-key-codes
;
; You can use either decimal or hex notation:
;   Decimal: Key=20
;   Hex:     Key=0x14
;

; ============================================================
;  INSTALLATION NOTES
; ============================================================
; 1. Place EnhancedFlightByBambozu.asi in: Crimson Desert\bin64\
; 2. Place this .ini file in the same directory
; 3. Use CDUMM or Ultimate ASI Loader to load the mod (place version.dll from ASI Loader in bin64 too)
; 4. Edit values in this file while the game runs - changes apply within 1 second
;

; ============================================================
;  FEATURE SUMMARY
; ============================================================
; CONTROLLER SUPPORT:
;   - Native support for Xbox controllers (XInput) and PS5 DualSense (HID)
;   - DualSense works via USB (wired) or Bluetooth (wireless)
;   - No additional software needed - plug and play!
;   - Auto-detects controller type and handles hot-plugging
;
; FLIGHT DETECTION:
;   - Mod only activates when wings are deployed (not during jumps/combat)
;   - Uses internal heuristics to avoid triggering on backsteps/hops
;
; SMOOTH ACCELERATION/DECELERATION:
;   - Horizontal and Aerial mechanics feature smooth ramping instead of instant speed changes
;   - Gradual acceleration when you press a button (RampUpMs)
;   - Gradual deceleration when you release a button (RampDownMs)
;   - Makes flight feel natural and fluid instead of janky
;   - Fully configurable per-mechanic timing (Horizontal, Aerial)
;
; ASCEND:
;   - Hold RB/R1 (controller) or Caps Lock (keyboard) to fly upward
;   - Direct velocity control for responsive upward flight
;   - Supports both button bindings and trigger bindings (LT/RT)
;   - Only works during flight (wings deployed)
;
; DESCEND:
;   - Hold RT/R2 (controller) or Ctrl (keyboard) to fly downward
;   - Direct velocity control for responsive downward flight
;   - Supports both button bindings and trigger bindings (LT/RT)
;   - Only works during flight (wings deployed)
;
; HORIZONTAL BOOST:
;   - DEFAULT: Hold A/Cross (controller) or Left Shift (keyboard) for speed boost
;   - Smoothly accelerates from 1.0x to target speed (e.g., 4.0x) - no more instant jitter!
;   - Smoothly decelerates back to normal speed when released
;   - Works immediately without needing to accelerate first
;   - Affects all flight modes (wings open and accelerated mode)
;   - Set UseToggle=true to switch to toggle behavior
;   - Only works during flight (wings deployed)
;
; AERIAL ROLL BOOST:
;   - Press B/Circle (controller) or Left Alt (keyboard) during flight to activate
;   - Smoothly ramps up to tremendous speed boost
;   - Boost lasts for Duration seconds, then smoothly ramps back down
;   - Perfect for covering large distances quickly with natural-looking acceleration
;   - Only works during flight (wings deployed)
;
