[ForcePalm]
# Enable/disable the force palm boost
Enabled=true

# Upward velocity value applied during boost window
# Default: 35.0 (original working value)
# Higher = more powerful boost
BoostValue=35.0

# How long (milliseconds) to sustain the velocity boost
# Default: 180ms
WindowMs=180

# Minimum milliseconds between consecutive boost fires (re-trigger cooldown)
# Prevents multi-fire from holding the button; set to 0 to disable
# Default: 400
TriggerCooldownMs=400

# Controller button code
# Xbox: 16384 = X button
# PS5:  16384 = Square button (automatically mapped)
Button=16384

# Keyboard fallback key (0 = disabled)
# Example: 0x20 = Spacebar, 0x56 = V key
Key=0x20
